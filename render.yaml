# render.yaml - Render deployment configuration
# This file helps configure your Render deployment

services:
  # Frontend - Static Site
  - type: web
    name: rfgsa
    env: static
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://ready-for-guests-sa.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend - Web Service
  - type: web
    name: ready-for-guests-sa
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: ready_for_guests
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: info.readyforguestssa@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
